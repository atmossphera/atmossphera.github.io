name: Actualizar feed de Instagram

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas
  workflow_dispatch:         # boton para lanzarlo a mano

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Descargar posts de Instagram
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: node scripts/fetch-instagram.mjs

      - name: Subir cambios si hay novedades
        run: |
          git config user.name "atmossphera-bot"
          git config user.email "actions@users.noreply.github.com"
          git add assets/instagram
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Actualizar feed de Instagram"
            git push
          fi
